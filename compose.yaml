services:
  dev:
    build: .
    image: ${DOCKER_IMAGE:-docker-legioni:latest}
    container_name: opencode-dev
    hostname: opencode-dev
    volumes:
      - ${WORKSPACE_PATH:?Set WORKSPACE_PATH in .env}:/workspace
      - ./.legioni:/home/dev/.legioni
      - dev-config:/home/dev/.config
    environment:
      - GIT_USER_NAME=${GIT_USER_NAME:-Dev User}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-dev@localhost}
    stdin_open: true
    tty: true

volumes:
  dev-config: