name: Build and push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [slim, go, java, php]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        run: |
          IMAGE="simoneloru/docker-legioni:${{ matrix.variant }}"
          docker build --target ${{ matrix.variant }} -t $IMAGE .
          if [ "${{ github.event_name }}" = "push" ]; then
            docker push $IMAGE
          fi

      - name: Tag slim as latest
        if: github.event_name == 'push' && matrix.variant == 'slim'
        run: |
          docker tag simoneloru/docker-legioni:slim simoneloru/docker-legioni:latest
          docker push simoneloru/docker-legioni:latest

  verify:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    container:
      image: simoneloru/docker-legioni:slim
    steps:
      - name: Check tools
        run: |
          echo "=== Tool versions ==="
          node --version
          python3 --version
          git --version
          gh --version
          opencode --version
          legioni --version
          echo "=== User ==="
          sudo whoami || true
          id
          echo "=== All OK ==="
